#version=RHEL8
# Flash install ??? ISMELKFLNODE01 / ismelkflnode01.ocplab.net / 10.44.40.42

ignoredisk --only-use=sda
clearpart --all --initlabel --drives=sda
autopart --type=lvm --nohome
bootloader --boot-drive=sda
network --onboot=on --bootproto=static --ip=10.44.40.42 --netmask=255.255.255.0 --gateway=10.44.40.1 --nameserver=10.44.40.1,8.8.8.8 --hostname=ismelkflnode01.ocplab.net --activate
rootpw --plaintext CHANGE_ME_root_password
timezone Asia/Hong_Kong --utc
keyboard us
lang en_US.UTF-8
eula --agreed
text
reboot

%packages
@^minimal-environment
openssh-server
hyperv-daemons
chrony
lvm2
xfsprogs
cloud-init
sudo
tar
curl
dnf-plugins-core
python3
%end

%post --log=/root/ks-post.log
set -x
systemctl enable sshd chronyd
systemctl disable kdump.service 2>/dev/null || true
mkdir -p /opt/elastic-setup
echo "FLASH_INSTALL_COMPLETE ismelkflnode01.ocplab.net" > /root/.flash-install-complete
%end
